name: Deploy to EC2

on:
  push:
    branches:
      - main

env:
  IMAGE_BACKEND: ghcr.io/nabilrahber2023/ai-mentor-backend
  IMAGE_FRONTEND: ghcr.io/nabilrahber2023/ai-mentor-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: nabilrahber2023
          password: ${{ secrets.GHCR_PAT }}

      - name: Build Backend
        run: |
          docker build \
            -t $IMAGE_BACKEND:latest \
            ./backend

      - name: Build Frontend
        run: |
          docker build \
            --build-arg BACKEND_URL=http://api:8000 \
            -t $IMAGE_FRONTEND:latest \
            ./frontend

      - name: Push Backend
        run: docker push $IMAGE_BACKEND:latest

      - name: Push Frontend
        run: docker push $IMAGE_FRONTEND:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u nabilrahber2023 --password-stdin

            cd ~/Master-Ai-Mentor

            docker compose -f docker-compose.aws.yml pull

            docker compose -f docker-compose.aws.yml up -d

            docker image prune -af